<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 20px;
            background-color: #f8f8f8;
        }

        h1 {
            color: #2A3042;
        }

        input {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #cfd8dc;
            border-radius: 5px;
        }

        button {
            padding: 12px;
            background-color: #009688;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-left: 5px;
        }

        button.addButton {
            background-color: #4F60BA;
            margin-right: 5px;
        }

        button.paymentButton {
            background-color: #4F60BA;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            padding: 12px;
            margin-right: 5px;
        }

        p#result {
            color: #00427e;
            margin-top: 10px;
        }

        #resultSection {
            margin-top: 20px;
        }

        .section {
            background-color: #4F60BA;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #cfd8dc;
            border-radius: 10px;
            position: relative;
        }

        .section input {
            margin: 5px 0; /* Equal margins on all sides */
        }

        .removeButton {
            background-color: #e57373;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        .addButton {
            background-color: #4F60BA;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            padding: 12px;
            margin-right: 5px;
        }

        .buttonContainer {
            display: flex;
            margin-bottom: 15px;
        }

        .result-container {
            background-color: #fff;
            padding: 20px;
            border: 1px solid #cfd8dc;
            border-radius: 10px;
            color: #2A3042;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .copyButton {
            background-color: #009688;
            color: white;
        }
    </style>
    <title>Pre-filled Form Link Generator</title>
</head>
<body>

    <h1>Pre-filled Form Link Generator</h1>

    <div id="formSection" class="section">
        <input type="text" id="formLink" placeholder="Enter Form Link">
    </div>

    <div class="buttonContainer">
        <button onclick="addSection()" class="addButton">+</button>
        <button onclick="addPaymentSection()" class="paymentButton">$</button>
        <button onclick="generateLink()">Generate Link</button>
    </div>

    <p id="result"></p>

    <div id="resultSection"></div>

    <script>
        var paymentSectionAdded = false;

        function addSection() {
            var sections = document.querySelectorAll('.section');
            var lastSection = sections[sections.length - 1];

            var newSection = document.createElement('div');
            newSection.className = 'section';
            newSection.innerHTML = `
                <input type="text" class="fieldID" placeholder="Enter Field ID">
                <input type="text" class="prefillValue" placeholder="Enter Prefill Value">
                <button onclick="removeSection(this)" class="removeButton">−</button>
            `;

            lastSection.insertAdjacentElement('afterend', newSection);
        }

        function addPaymentSection() {
            if (paymentSectionAdded) {
                alert('Only one payment prefill is allowed.');
                return;
            }

            var sections = document.querySelectorAll('.section');
            var lastSection = sections[sections.length - 1];

            var newSection = document.createElement('div');
            newSection.className = 'section';
            newSection.innerHTML = `
                <input type="text" class="fieldID" placeholder="payment_variable_input_amount_field_id" disabled>
                <input type="text" class="prefillValue paymentInput" placeholder="Enter amount in cents">
                <button onclick="removeSection(this)" class="removeButton">−</button>
            `;

            newSection.classList.add('payment-section');

            lastSection.insertAdjacentElement('afterend', newSection);

            paymentSectionAdded = true;
        }

        function removeSection(button) {
            var section = button.parentNode;

            if (section.classList.contains('payment-section')) {
                paymentSectionAdded = false;
            }

            section.parentNode.removeChild(section);
        }

        function generateLink() {
            var formLink = document.getElementById('formLink').value;
            var fieldSections = document.querySelectorAll('.section:not(#formSection)');
            var link = formLink;

            fieldSections.forEach(function (section, index) {
                var fieldID = section.querySelector('.fieldID').value;
                var prefillValue = section.querySelector('.prefillValue').value;

                if (index === 0 && (!formLink || (!fieldID && !section.classList.contains('payment-section')) || !prefillValue)) {
                    alert('Please fill in the required fields (Form Link, Field ID, Prefill Value).');
                    return;
                }

                if (fieldID && prefillValue) {
                    link += (index === 0 ? '?' : '&') + fieldID + '=' + prefillValue;
                } else if (prefillValue && section.classList.contains('payment-section')) {
                    if (!/^\d+$/.test(prefillValue)) {
                        alert('Payment prefill value must be a non-negative integer.');
                        return;
                    }

                    link += (index === 0 ? '?' : '&') + 'payment_variable_input_amount_field_id=' + prefillValue;
                }
            });

            var resultSection = document.getElementById('resultSection');
            resultSection.innerHTML = `
                <div class="result-container">
                    <div>
                        <h2>Generated Prefilled Form Link:</h2>
                        <p>${link}</p>
                    </div>
                    <button onclick="copyLink()" class="copyButton">Copy</button>
                </div>
            `;
        }

        function copyLink() {
            var linkText = document.getElementById('resultSection').querySelector('p');
            var tempInput = document.createElement('input');
            tempInput.value = linkText.textContent;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            alert('Link copied to clipboard!');
        }
    </script>

</body>
</html>
